services:
  - type: web
    name: chefpath-backend
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/springboot-applications-0.0.1-SNAPSHOT.jar
    autoDeploy: true
    envVars:
      - key: APP_CORS_ALLOWED_ORIGIN
        value: https://<YOUR_GITHUB_USERNAME>.github.io/<YOUR_REPOSITORY_NAME>
