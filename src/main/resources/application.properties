# ============================================================
# Application
# ============================================================
spring.application.name=cooking-education-platform
server.port=${PORT:8081}
spring.config.import=optional:file:.env[.properties]

# ============================================================
# Supabase Configuration
# The backend forwards the user's Supabase JWT in every
# PostgREST call so RLS policies enforce per-user access.
# ============================================================
supabase.url=${SUPABASE_URL}
supabase.anon-key=${SUPABASE_ANON_KEY}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}
app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:8081}

# ============================================================
# Cooking Platform Constants
# ============================================================
cooking.total-lectures=100

# ============================================================
# Resend Email Configuration
# Set RESEND_API_KEY as an environment variable — never hardcode
# ============================================================
resend.api.key=${RESEND_API_KEY}
resend.from.address=${RESEND_FROM_ADDRESS:onboarding@resend.dev}
admin.email=${ADMIN_EMAIL}
