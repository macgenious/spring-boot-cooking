<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ChefPath — Lecture detail and video player." />
  <title>Lecture — ChefPath</title>
  <link rel="stylesheet" th:href="@{/css/design-system.css}" />
</head>
<body>

  <div id="loading-overlay" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <div class="page-wrap">

    <!-- Nav -->
    <header>
      <div class="nav">
        <a href="/dashboard" class="nav__logo">
          <span class="nav__logo-icon">👨‍🍳</span>
          ChefPath
        </a>
        <div class="nav__right">
          <button class="nav__sign-out" onclick="Auth.signOut()">Sign out</button>
        </div>
      </div>
    </header>

    <main>
      <div class="container lecture-detail">

        <!-- Breadcrumb -->
        <div class="breadcrumb">
          <a href="/dashboard">Curriculum</a>
          <span class="breadcrumb__sep">›</span>
          <a href="#" id="breadcrumb-unit-link">Unit</a>
          <span class="breadcrumb__sep">›</span>
          <span id="breadcrumb-num">Lecture</span>
        </div>

        <!-- Tags -->
        <div class="lecture-tags">
          <span class="tag tag--outline" id="lecture-unit-tag">Unit 1</span>
          <span class="tag tag--outline" id="lecture-num-tag">Lecture 1</span>
        </div>

        <!-- Title -->
        <h1 class="lecture-title" id="lecture-title">Loading…</h1>

        <!-- Video -->
        <div class="video-container" id="video-container">
          <div class="video-placeholder">
            <span class="video-placeholder__icon">▶</span>
            <span>Loading video…</span>
          </div>
        </div>

        <!-- Description -->
        <div class="lecture-desc-block" id="lecture-description"></div>

        <!-- Actions -->
        <div class="lecture-actions">
          <button class="btn btn-ghost" onclick="navigatePrevious()">← Previous</button>
          <div class="lecture-actions__spacer"></div>
          <button class="btn btn-secondary" id="btn-complete" onclick="completeLecture()">
            Mark as complete
          </button>
          <button class="btn btn-primary" onclick="navigateNext()">Next →</button>
        </div>

      </div>
    </main>

  </div>

  <script th:inline="javascript">
    window.__SUPABASE_URL__      = /*[[${supabaseUrl}]]*/ '';
    window.__SUPABASE_ANON_KEY__ = /*[[${supabaseAnonKey}]]*/ '';
  </script>
  <script th:src="@{/js/supabase-auth.js}"></script>
  <script th:src="@{/js/app.js}"></script>
  <script>
    document.addEventListener('DOMContentLoaded', initLectureDetail);
  </script>
</body>
</html>
