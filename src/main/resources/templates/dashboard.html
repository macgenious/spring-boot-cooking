<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ChefPath Dashboard — explore your cooking curriculum." />
  <title>Dashboard — ChefPath</title>
  <link rel="stylesheet" th:href="@{/css/design-system.css}" />
</head>
<body>

  <div id="loading-overlay" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <!-- ── Navigation ──────────────────────────────── -->
  <nav class="topnav">
    <div class="topnav__inner">
      <a href="/dashboard" class="topnav__logo">
        <span class="topnav__logo-icon">🍴</span>
        ChefPath
      </a>
      <div class="topnav__right">
        <span class="streak-pill" id="streak-pill">
          <span class="streak-pill__fire">🔥</span>
          <span id="streak-val">0 day streak</span>
        </span>
        <a href="/profile" class="profile-pill">
          <span class="profile-pill__icon">👤</span>
          <span id="user-name">Profile</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- ── Hero: Fact Carousel ─────────────────────── -->
  <section class="hero-section" id="hero">
    <div class="hero-section__fork">🍴</div>

    <div class="carousel-wrap">
      <!-- Slides populated by JS -->
      <div class="carousel-track" id="carousel-track"></div>
      <div class="carousel-dots" id="carousel-dots"></div>
    </div>

    <button class="scroll-arrow-btn" onclick="document.getElementById('units').scrollIntoView({behavior:'smooth'})"
            aria-label="Scroll to course units">↓</button>
  </section>

  <!-- ── Course Units ─────────────────────────────── -->
  <section class="units-section" id="units">
    <h2 class="units-section__title">Course Units</h2>
    <div class="units-scroll-wrap">
      <div class="units-row" id="units-row">
        <!-- populated by JS -->
      </div>
    </div>
    <div class="units-nav">
      <button class="units-nav__btn" id="units-prev" onclick="scrollUnits(-1)">‹</button>
      <button class="units-nav__btn" id="units-next" onclick="scrollUnits(1)">›</button>
    </div>
  </section>

  <script th:inline="javascript">
    window.__SUPABASE_URL__      = /*[[${supabaseUrl}]]*/ '';
    window.__SUPABASE_ANON_KEY__ = /*[[${supabaseAnonKey}]]*/ '';
  </script>
  <script th:src="@{/js/supabase-auth.js}"></script>
  <script th:src="@{/js/app.js}"></script>
  <script>
    document.addEventListener('DOMContentLoaded', initDashboard);
  </script>
</body>
</html>
