<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ChefPath — Master the art of cooking through structured video lectures and a gamified learning path." />
  <title>Sign In — ChefPath</title>
  <link rel="stylesheet" th:href="@{/css/design-system.css}" />
</head>
<body>

  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner"></div>
  </div>

  <main class="page-login">
    <div class="login-wrap">

      <div class="login-header">
        <span class="login-icon">👨‍🍳</span>
        <h1 class="login-title">ChefPath</h1>
        <p class="login-subtitle">Master the art of cooking</p>
      </div>

      <div id="auth-error" class="login-error"></div>

      <form id="login-form" class="login-form" onsubmit="return handleLogin(event)">
        <input
          id="email"
          type="email"
          class="input-field"
          placeholder="Email address"
          required
          autocomplete="email"
        />
        <input
          id="password"
          type="password"
          class="input-field"
          placeholder="Password"
          required
          autocomplete="current-password"
          minlength="6"
        />
        <button type="submit" id="btn-login" class="btn btn-primary btn-full" style="margin-top:4px;">
          Sign In
        </button>
      </form>

      <p class="login-footer">
        Don't have an account?
        <a href="#" id="toggle-mode" onclick="toggleMode(event)">Sign Up</a>
      </p>

    </div>
  </main>

  <script th:inline="javascript">
    window.__SUPABASE_URL__      = /*[[${supabaseUrl}]]*/ '';
    window.__SUPABASE_ANON_KEY__ = /*[[${supabaseAnonKey}]]*/ '';
  </script>
  <script th:src="@{/js/supabase-auth.js}"></script>
  <script>
    let isSignUp = false;

    function toggleMode(e) {
      e.preventDefault();
      isSignUp = !isSignUp;
      const btn    = document.getElementById('btn-login');
      const footer = document.querySelector('.login-footer');
      if (isSignUp) {
        btn.textContent = 'Create Account';
        footer.innerHTML = 'Already have an account? <a href="#" id="toggle-mode" onclick="toggleMode(event)">Sign In</a>';
      } else {
        btn.textContent = 'Sign In';
        footer.innerHTML = 'Don\'t have an account? <a href="#" id="toggle-mode" onclick="toggleMode(event)">Sign Up</a>';
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email   = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl   = document.getElementById('auth-error');
      const btn     = document.getElementById('btn-login');

      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = isSignUp ? 'Creating account…' : 'Signing in…';

      try {
        if (isSignUp) {
          const data = await Auth.signUp(email, password);
          if (data.access_token) {
            window.location.href = '/dashboard';
          } else {
            errEl.textContent    = '✉️ Check your email to confirm your account.';
            errEl.style.display  = 'block';
          }
        } else {
          await Auth.signIn(email, password);
          window.location.href = '/dashboard';
        }
      } catch (err) {
        errEl.textContent   = err.message;
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = isSignUp ? 'Create Account' : 'Sign In';
      }
      return false;
    }

    if (Auth.isAuthenticated()) {
      window.location.href = '/dashboard';
    }
  </script>
</body>
</html>
