<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ChefPath — Master the art of cooking with guided video lectures, streak tracking, and a gamified learning path." />
  <title>Sign In — ChefPath</title>
  <link rel="stylesheet" th:href="@{/css/design-system.css}" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner"></div>
  </div>

  <!-- Login Page -->
  <main class="page-login">
    <div class="login-card glass-card animate-in" style="cursor:default;">

      <span class="login-card__icon">👨‍🍳</span>

      <h1 class="login-card__title ember-text">ChefPath</h1>
      <p class="login-card__subtitle">Master the Art of Cooking</p>

      <!-- Error message -->
      <div id="auth-error" style="display:none; color:var(--error); font-size:0.85rem; margin-bottom:var(--space-md); padding:var(--space-sm) var(--space-md); background:rgba(255,113,108,0.1); border-radius:var(--radius-md);"></div>

      <form id="login-form" class="login-card__form" onsubmit="return handleLogin(event)">
        <div>
          <input
            id="email"
            type="email"
            class="input-field"
            placeholder="Email address"
            required
            autocomplete="email"
          />
        </div>
        <div>
          <input
            id="password"
            type="password"
            class="input-field"
            placeholder="Password"
            required
            autocomplete="current-password"
            minlength="6"
          />
        </div>
        <button type="submit" id="btn-login" class="btn btn-primary btn-lg" style="width:100%; margin-top:var(--space-sm);">
          Sign In
        </button>
      </form>

      <p class="login-card__footer">
        Don't have an account?
        <a href="#" id="toggle-mode" onclick="toggleMode(event)">Sign Up</a>
      </p>
    </div>
  </main>

  <script th:inline="javascript">
    window.__SUPABASE_URL__ = /*[[${supabaseUrl}]]*/ '';
    window.__SUPABASE_ANON_KEY__ = /*[[${supabaseAnonKey}]]*/ '';
  </script>
  <script th:src="@{/js/supabase-auth.js}"></script>
  <script>
    let isSignUp = false;

    function toggleMode(e) {
      e.preventDefault();
      isSignUp = !isSignUp;
      const btn = document.getElementById('btn-login');
      const link = document.getElementById('toggle-mode');
      const footer = document.querySelector('.login-card__footer');

      if (isSignUp) {
        btn.textContent = 'Create Account';
        footer.innerHTML = 'Already have an account? <a href="#" id="toggle-mode" onclick="toggleMode(event)">Sign In</a>';
      } else {
        btn.textContent = 'Sign In';
        footer.innerHTML = 'Don\'t have an account? <a href="#" id="toggle-mode" onclick="toggleMode(event)">Sign Up</a>';
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('auth-error');
      const btn = document.getElementById('btn-login');

      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = isSignUp ? 'Creating account…' : 'Signing in…';

      try {
        if (isSignUp) {
          const data = await Auth.signUp(email, password);
          if (data.access_token) {
            window.location.href = '/dashboard';
          } else {
            errEl.textContent = '✉️ Check your email to confirm your account.';
            errEl.style.display = 'block';
            errEl.style.color = 'var(--tertiary)';
            errEl.style.background = 'rgba(225,144,241,0.1)';
          }
        } else {
          await Auth.signIn(email, password);
          window.location.href = '/dashboard';
        }
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        errEl.style.color = 'var(--error)';
        errEl.style.background = 'rgba(255,113,108,0.1)';
      } finally {
        btn.disabled = false;
        btn.textContent = isSignUp ? 'Create Account' : 'Sign In';
      }

      return false;
    }

    // If already logged in, redirect to dashboard
    if (Auth.isAuthenticated()) {
      window.location.href = '/dashboard';
    }
  </script>
</body>
</html>
