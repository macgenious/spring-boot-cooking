<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Browse lectures in a ChefPath cooking unit." />
  <title>Unit — ChefPath</title>
  <link rel="stylesheet" th:href="@{/css/design-system.css}" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <!-- Top Navigation Bar -->
  <nav class="top-bar">
    <a href="/dashboard" class="top-bar__brand">
      <span class="top-bar__brand-icon">👨‍🍳</span>
      ChefPath
    </a>
    <div class="top-bar__right">
      <button class="btn btn-ghost" onclick="Auth.signOut()" title="Sign out">
        <span class="material-symbols-outlined">logout</span>
      </button>
    </div>
  </nav>

  <main class="dashboard">
    <!-- Back link + unit title -->
    <div class="lecture-header animate-in">
      <a href="/dashboard" class="lecture-header__back">
        <span class="material-symbols-outlined">arrow_back</span>
      </a>
      <div class="lecture-header__info">
        <h1 id="unit-title" style="font-size:1.4rem;">Loading…</h1>
      </div>
    </div>

    <!-- Lecture List -->
    <div id="lectures-list" class="dashboard__units" style="margin-top:var(--space-lg);">
      <!-- Populated by JavaScript -->
    </div>
  </main>

  <script th:inline="javascript">
    window.__SUPABASE_URL__ = /*[[${supabaseUrl}]]*/ '';
    window.__SUPABASE_ANON_KEY__ = /*[[${supabaseAnonKey}]]*/ '';
  </script>
  <script th:src="@{/js/supabase-auth.js}"></script>
  <script th:src="@{/js/app.js}"></script>
  <script>
    document.addEventListener('DOMContentLoaded', initLectureList);
  </script>
</body>
</html>
