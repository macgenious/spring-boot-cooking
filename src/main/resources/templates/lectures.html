<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ChefPath — Browse lectures in this cooking unit." />
  <title>Unit — ChefPath</title>
  <link rel="stylesheet" th:href="@{/css/design-system.css}" />
</head>
<body>

  <div id="loading-overlay" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <div class="page-wrap">

    <!-- Nav -->
    <header>
      <div class="nav">
        <a href="/dashboard" class="nav__logo">
          <span class="nav__logo-icon">👨‍🍳</span>
          ChefPath
        </a>
        <div class="nav__right">
          <button class="nav__sign-out" onclick="Auth.signOut()">Sign out</button>
        </div>
      </div>
    </header>

    <main>
      <div class="container">

        <a href="/dashboard" class="back-link">← All units</a>

        <div class="page-header">
          <h1 class="page-title" id="unit-title">Unit</h1>
          <p class="page-subtitle" id="unit-description"></p>
        </div>

        <div id="lectures-list">
          <!-- populated by JS -->
        </div>

        <div style="height: 48px;"></div>

      </div>
    </main>

  </div>

  <script th:inline="javascript">
    window.__SUPABASE_URL__      = /*[[${supabaseUrl}]]*/ '';
    window.__SUPABASE_ANON_KEY__ = /*[[${supabaseAnonKey}]]*/ '';
  </script>
  <script th:src="@{/js/supabase-auth.js}"></script>
  <script th:src="@{/js/app.js}"></script>
  <script>
    document.addEventListener('DOMContentLoaded', initLectureList);
  </script>
</body>
</html>
