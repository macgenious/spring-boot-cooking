<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ChefPath Dashboard — your cooking curriculum overview and progress tracker." />
  <title>Dashboard — ChefPath</title>
  <link rel="stylesheet" href="./css/design-system.css" />
</head>
<body>

  <div id="loading-overlay" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <div class="page-wrap">

    <!-- Nav -->
    <header>
      <div class="nav">
        <a href="./dashboard.html" class="nav__logo">
          <span class="nav__logo-icon">👨‍🍳</span>
          ChefPath
        </a>
        <nav class="nav__links">
          <a href="./dashboard.html" class="nav__link">Curriculum</a>
        </nav>
        <div class="nav__actions">
          <button class="nav__sign-out" onclick="Auth.signOut()">Sign out</button>
        </div>
      </div>
    </header>

    <main>
      <div class="container">

        <!-- Page header -->
        <div class="page-header">
          <h1 class="page-header__title">Your Curriculum</h1>
          <p class="page-header__subtitle">20 units · 100 lectures · Master the art of cooking</p>
        </div>

        <!-- Stats -->
        <div class="stats-row">
          <div class="stat">
            <span class="stat__value" id="progress-val">0%</span>
            <span class="stat__label">complete</span>
          </div>
          <div class="stat__divider"></div>
          <div class="stat">
            <span class="stat__value" id="streak-val">0</span>
            <span class="stat__label">day streak</span>
          </div>
          <div class="stat__divider"></div>
          <div class="stat">
            <span class="stat__value" id="completed-val">0</span>
            <span class="stat__label">lectures done</span>
          </div>
        </div>

        <!-- Progress bar -->
        <div style="margin-bottom: var(--space-xl);">
          <div class="progress-bar" style="height:2px;">
            <div class="progress-bar__fill" id="progress-fill" style="width:0%"></div>
          </div>
        </div>

        <!-- Units list -->
        <p class="section-heading">All Units</p>
        <div class="units-grid" id="units-list">
          <!-- populated by JS -->
        </div>

      </div>
    </main>

  </div>

  <script src="./js/config.js"></script>
  <script src="./js/supabase-auth.js"></script>
  <script src="./js/app.js"></script>
  <script>
    initDashboard();
  </script>
</body>
</html>
