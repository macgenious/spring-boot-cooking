<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ChefPath — Lecture detail and video player." />
  <title>Lecture — ChefPath</title>
  <link rel="stylesheet" href="./css/design-system.css" />
</head>
<body>

  <div id="loading-overlay" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <div class="page-wrap">

    <!-- Nav -->
    <header>
      <div class="nav">
        <a href="./dashboard.html" class="nav__logo">
          <span class="nav__logo-icon">👨‍🍳</span>
          ChefPath
        </a>
        <nav class="nav__links">
          <a href="./dashboard.html" class="nav__link">Curriculum</a>
        </nav>
        <div class="nav__actions">
          <button class="nav__sign-out" onclick="Auth.signOut()">Sign out</button>
        </div>
      </div>
    </header>

    <main>
      <div class="container lecture-detail">

        <!-- Breadcrumb -->
        <div class="lecture-detail__breadcrumb">
          <a href="./dashboard.html">Curriculum</a>
          <span class="lecture-detail__breadcrumb-sep">›</span>
          <a href="#" id="breadcrumb-unit-link">Unit</a>
          <span class="lecture-detail__breadcrumb-sep">›</span>
          <span id="breadcrumb-lecture-num">Lecture</span>
        </div>

        <!-- Tags -->
        <div class="lecture-detail__tag-row">
          <span class="tag tag--outline" id="lecture-unit-tag">Unit 1</span>
          <span class="tag tag--outline" id="lecture-num-tag">Lecture 1 of 5</span>
        </div>

        <!-- Title -->
        <h1 class="lecture-detail__title" id="lecture-title">Loading…</h1>

        <!-- Video -->
        <div class="video-container" id="video-container">
          <div class="video-placeholder">
            <span class="video-placeholder__icon">▶</span>
            <span class="video-placeholder__text">Loading video…</span>
          </div>
        </div>

        <!-- Description -->
        <div class="lecture-description" id="lecture-description"></div>

        <!-- Actions -->
        <div class="lecture-actions">
          <button class="btn btn-white" onclick="navigatePrevious()">← Previous</button>
          <div class="lecture-actions__spacer"></div>
          <button class="btn btn-gray" id="btn-complete" onclick="completeLecture()">
            Mark as complete
          </button>
          <button class="btn btn-black" onclick="navigateNext()">Next →</button>
        </div>

      </div>
    </main>

  </div>

  <script src="./js/config.js"></script>
  <script src="./js/supabase-auth.js"></script>
  <script src="./js/app.js"></script>
  <script>
    initLectureDetail();
  </script>
</body>
</html>
