<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="ChefPath — Unit lectures."/>
  <title>Unit — ChefPath</title>
  <link rel="stylesheet" href="./css/design-system.css"/>
  <script>
    (function(){var t=localStorage.getItem('chefpath-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();
  </script>
</head>
<body>
  <div id="loading-overlay" class="loading-overlay"><div class="spinner"></div></div>

  <!-- TOP NAVBAR -->
  <nav class="navbar">
    <div class="navbar__inner">
      <a href="./dashboard.html" class="navbar__logo">
        <span class="navbar__logo-icon">👨‍🍳</span> ChefPath
      </a>
      <div class="navbar__right">
        <div class="streak-badge">
          <span class="streak-badge__icon">🔥</span>
          <span id="streak-label">0 day streak</span>
        </div>
        <a href="./profile.html" class="profile-btn" style="text-decoration: none;">
          <div class="profile-btn__avatar">👤</div>
          <span>Profile</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main>
    <div class="container unit-page">
      <div class="unit-page__header">
        <a href="/dashboard#units-section" class="back-link">← Back to curriculum</a>
        <h1 class="unit-page__title" id="unit-title">Loading…</h1>
        <p class="unit-page__subtitle" id="unit-subtitle"></p>
        <p class="unit-page__meta" id="unit-meta"></p>
      </div>
      <div class="lessons-list" id="lessons-list">
        <!-- populated by app.js -->
      </div>
    </div>
  </main>

  <!-- FOOTER UNIT NAV — rendered by JS after data loads -->
  <nav class="unit-footer-nav" id="unit-footer-nav" style="display:none;">
    <div class="unit-footer-nav__inner">
      <!-- Previous button — hidden on unit 1 -->
      <div id="footer-prev-wrap">
        <a id="footer-prev-btn" href="#" class="btn btn-outline">← Previous unit</a>
      </div>
      <!-- Center label -->
      <span class="unit-footer-nav__center" id="footer-unit-label"></span>
      <!-- Next button — hidden on unit 20, disabled if locked -->
      <div id="footer-next-wrap">
        <a id="footer-next-btn" href="#" class="btn btn-black">Next unit →</a>
      </div>
    </div>
  </nav>

  <script src="./js/config.js"></script>
  <script src="./js/supabase-auth.js"></script>
  <script src="./js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', initLectureList);
  </script>
</body>
</html>
